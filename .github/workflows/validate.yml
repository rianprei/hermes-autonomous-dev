name: Validate Hermes Autonomous Dev Kit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-linux:
    name: Validate on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        run: pip install hermes-agent==0.15.2

      - name: Install Hermes Autonomous Dev Kit (Linux)
        env:
          HB_INSTALL_SRC: ${{ github.workspace }}
        run: |
          chmod +x wrappers/hb-install
          ./wrappers/hb-install

      - name: Verify Hermes installed
        run: hermes --version

      - name: Health check
        run: hb doctor

      - name: Test repo workflow
        run: |
          git init test-repo && cd test-repo
          git config user.email "ci@test"
          git config user.name "CI"
          echo "test" > file.txt && git add . && git commit -m "init"
          hb -q "echo hello from linux"

      - name: Test hb-auto requires flag
        run: |
          cd test-repo
          ! hb-auto "echo test" 2>&1 | grep -q "MODO OFF"
          echo "OK: hb-auto bloqueou sem flag"

      - name: Test hb-auto with flag accepted
        run: |
          cd test-repo
          hb-auto --confirm-i-accept-risks "echo test" 2>&1 | grep -q "MODO OFF" && exit 1 || echo "OK: flag aceita"

      - name: Audit session
        run: hb audit

  validate-windows:
    name: Validate on Windows
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        run: pip install hermes-agent==0.15.2

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Install Hermes Autonomous Dev Kit (Windows)
        shell: pwsh
        env:
          HB_INSTALL_SRC: ${{ github.workspace }}
        run: |
          .\wrappers\windows\hb-install.ps1 -Source $env:HB_INSTALL_SRC

      - name: Verify Hermes installed
        run: hermes --version

      - name: Health check
        shell: pwsh
        run: |
          & "$HOME\.local\bin\hb.ps1" doctor

      - name: Test repo workflow (Windows)
        shell: pwsh
        run: |
          git init test-repo; cd test-repo
          git config user.email "ci@test"
          git config user.name "CI"
          "test" | Out-File -FilePath file.txt -Encoding utf8
          git add .; git commit -m "init"
          & "$HOME\.local\bin\hb.ps1" -q "echo hello from windows"

      - name: Test hb-auto Windows requires flag
        shell: pwsh
        run: |
          cd test-repo
          & "$HOME\.local\bin\hb-auto.ps1" "echo test"
          if ($LASTEXITCODE -eq 0) { exit 1 }
          Write-Host "OK: hb-auto bloqueou sem flag (exit $LASTEXITCODE)"
          exit 0

      - name: Test hb-auto Windows with flag accepted
        shell: pwsh
        run: |
          cd test-repo
          $output = & "$HOME\.local\bin\hb-auto.ps1" -ConfirmIAcceptRisks "echo test" 2>&1
          if ($output -match "MODO OFF") { exit 1 }
          Write-Host "OK: flag aceita (sem MODO OFF)"
          exit 0

      - name: Audit session
        shell: pwsh
        run: |
          & "$HOME\.local\bin\hb.ps1" audit