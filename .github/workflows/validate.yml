name: Validate Hermes Autonomous Dev Kit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-linux:
    name: Validate on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        run: pip install hermes-agent==0.15.2

      - name: Verify Hermes installed
        run: hermes --version

      - name: Set up wrappers from repository
        run: |
          mkdir -p "$HOME/.local/bin"
          cp wrappers/* "$HOME/.local/bin/" 2>/dev/null || true
          chmod +x "$HOME/.local/bin"/* 2>/dev/null || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify hb-install available
        run: which hb-install

      - name: Health check
        run: hb doctor

      - name: Test repo workflow
        run: |
          git init test-repo && cd test-repo
          git config user.email "ci@test"
          git config user.name "CI"
          echo "test" > file.txt && git add . && git commit -m "init"
          hb -q "echo hello from linux"

      - name: Test hb-auto requires flag
        run: |
          cd test-repo
          hb-auto "echo test" && exit 1 || true  # deve falhar sem flag

      - name: Test hb-auto with flag
        run: |
          cd test-repo
          hb-auto --confirm-i-accept-risks "echo test with flag"

      - name: Audit session
        run: hb audit

  validate-windows:
    name: Validate on Windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hermes Agent
        run: pip install hermes-agent==0.15.2

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Verify Hermes installed
        run: hermes --version

      - name: Set up Windows wrappers from repository
        shell: pwsh
        run: |
          $binDir = "$HOME\.local\bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item "wrappers\windows\*" -Destination $binDir -Force
          $env:PATH += ";$binDir"
          "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify hb-install available
        run: where hb-install

      - name: Health check
        run: hb doctor

      - name: Test repo workflow (Windows)
        shell: pwsh
        run: |
          git init test-repo; cd test-repo
          git config user.email "ci@test"
          git config user.name "CI"
          "test" | Out-File -FilePath file.txt -Encoding utf8
          git add .; git commit -m "init"
          hb.ps1 -q "echo hello from windows"

      - name: Test hb-auto Windows requires flag
        shell: pwsh
        run: |
          cd test-repo
          $result = hb-auto.ps1 "echo test" 2>&1
          if (-not ($result -match "MODO OFF")) { exit 1 }
          # deve falhar sem flag

      - name: Test hb-auto Windows with flag
        shell: pwsh
        run: |
          cd test-repo
          hb-auto.ps1 -ConfirmIAcceptRisks "echo test with flag"

      - name: Audit session
        run: hb audit